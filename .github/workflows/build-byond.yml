name: Build and Push BYOND Image

on:
  push:
    branches: [ "main" ] # Runs automatically when you push code to your main branch
  workflow_dispatch:     # Allows you to trigger the build manually from the GitHub UI

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase to match GitHub registry requirements
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up QEMU to handle multi-architecture translation smoothly if needed
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logs into GitHub Container Registry automatically using the workflow token
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically extracts and formats image tags (adds both version and latest tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=516.1685
            type=raw,value=latest

      # Builds the image and pushes it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # Ensures the image is strictly cached to speed up future runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
